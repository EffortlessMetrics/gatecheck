name: publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --workspace --all-targets

      - name: Publish all crates to crates.io
        run: |
          publish() {
            local crate=$1
            local attempt
            for attempt in 1 2 3; do
              echo "Publishing $crate (attempt $attempt)..."
              if output=$(cargo publish -p "$crate" 2>&1); then
                echo "$crate published"
                sleep 60
                return 0
              elif echo "$output" | grep -qE "already (uploaded|exists)"; then
                echo "$crate already published, skipping"
                return 0
              elif echo "$output" | grep -q "429"; then
                echo "$crate rate-limited, waiting 120s..."
                sleep 120
              else
                echo "$output" >&2
                exit 1
              fi
            done
            echo "$crate failed after 3 attempts" >&2
            exit 1
          }

          publish gatecheck-types
          publish gatecheck-codes
          publish gatecheck-policy
          publish gatecheck-eval
          publish gatecheck-export-markdown
          publish gatecheck-fixtures
          publish gatecheck-fs
          publish gatecheck

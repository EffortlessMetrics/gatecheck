name: publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --workspace --all-targets

      - name: Publish all crates to crates.io
        run: |
          publish() {
            local crate=$1
            echo "Publishing $crate..."
            if output=$(cargo publish -p "$crate" 2>&1); then
              echo "$crate published"
            elif echo "$output" | grep -q "already uploaded"; then
              echo "$crate already published, skipping"
            else
              echo "$output" >&2
              exit 1
            fi
            sleep 60
          }

          publish gatecheck-types
          publish gatecheck-codes
          publish gatecheck-policy
          publish gatecheck-eval
          publish gatecheck-export-markdown
          publish gatecheck-fixtures
          publish gatecheck-fs
          # Last crate, no sleep needed after
          echo "Publishing gatecheck..."
          cargo publish -p gatecheck
